name: ferfit_flutter
description: A new Flutter project for FerFit - AI Fitness Platform.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  shared_preferences: ^2.2.0
  flutter_secure_storage: ^9.2.4
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  table_calendar: ^3.1.2
  lucide_icons_flutter: ^3.1.14+2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  video_player: ^2.9.2
  webview_flutter: ^4.14.1
  home_widget: ^0.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "../mockups/ferfit_logo_hq_1783179106745.jpg"
  min_sdk_Android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/mascot/
    - assets/feo_demos/


